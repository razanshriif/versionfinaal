<ion-header class="ion-no-border">
  <div class="lum-logo-bar">
    <div class="lum-logo-wrap">
      <img src="assets/otflow-horizontal.png" alt="Otflow" />
    </div>
    <div class="lum-logo-actions">
      <button class="lum-icon-btn" (click)="goToNotifications()">
        <ion-icon name="notifications-outline"></ion-icon>
      </button>
      <button class="lum-icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </div>

  <div class="lum-sub-bar">
    <button class="lum-back-btn" (click)="navCtrl.back()">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <h1 class="lum-page-title">IA OTFLOW</h1>
    <button class="lum-filter-btn" (click)="clearChat()">
      <ion-icon name="trash-outline"></ion-icon>
    </button>
  </div>
</ion-header>

<ion-content class="premium-content">
  <div class="glass-background">
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="chat-container">
    <div *ngFor="let message of messages" class="message-row" [class.user-message]="message.isUser"
      [class.bot-message]="!message.isUser">
      
      <!-- Bot Avatar -->
      <div class="bot-avatar-wrap" *ngIf="!message.isUser">
        <ion-icon name="infinite-outline"></ion-icon>
      </div>

      <div class="message-bubble">
        <div class="message-text" [innerHTML]="formatMessage(message.text)"></div>
        <div class="message-time">{{ getMessageTime(message.timestamp) }}</div>
      </div>
    </div>

    <div *ngIf="isTyping" class="message-row bot-message">
      <div class="message-bubble typing-indicator">
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="input-container">
    <ion-textarea [(ngModel)]="userInput" placeholder="Écrivez votre message..." rows="1" autoGrow="true"
      (keyup.enter)="sendMessage()"></ion-textarea>
    <ion-button class="send-btn" (click)="sendMessage()" [disabled]="!userInput.trim()">
      <ion-icon name="send" slot="icon-only"></ion-icon>
    </ion-button>
  </div>
</ion-footer>
