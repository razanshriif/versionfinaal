<div class="auth-wrapper">
    <div class="auth-card register-wide">
        <div class="auth-header">
            <div class="auth-logo">
                <img src="assets/otflow-logo.png" alt="OTFLOW Logistique">
            </div>
            <h2>Créer un Compte</h2>
            <p class="auth-subtitle">Rejoignez OTFLOW aujourd'hui</p>
        </div>

        <!-- Success Message -->
        <div *ngIf="success" class="auth-success">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>Inscription réussie !</h3>
            <div class="success-details">
                <p><i class="fas fa-envelope"></i> Confirmation envoyée à <strong>{{user.email}}</strong></p>
                <p><i class="fas fa-clock"></i> En attente de validation par l'administrateur</p>
            </div>
            <p class="redirect-hint">Redirection en cours...</p>
        </div>

        <!-- Registration Form -->
        <form *ngIf="!success" class="auth-form" (ngSubmit)="onSubmit()">
            <div class="form-row">
                <div class="form-group">
                    <label>Prénom</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" [(ngModel)]="user.firstname" name="firstname" placeholder="Ex: Jean"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nom</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" [(ngModel)]="user.lastname" name="lastname" placeholder="Ex: Dupont"
                            required>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Civilité</label>
                    <div class="input-wrapper">
                        <i class="fas fa-venus-mars"></i>
                        <select [(ngModel)]="user.civilite" name="civilite" required>
                            <option value="">Sélectionner</option>
                            <option value="Mr">Monsieur</option>
                            <option value="Mme">Madame</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Téléphone</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" [(ngModel)]="user.telephone" name="telephone" placeholder="01 23 45 67 89" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Nom de la Société / Facturation</label>
                <div class="input-wrapper">
                    <i class="fas fa-building"></i>
                    <input type="text" [(ngModel)]="user.societeFacturation" name="societeFacturation" placeholder="Nom de votre entreprise" required>
                </div>
            </div>

            <div class="form-group">
                <label>Adresse complète</label>
                <div class="input-wrapper">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" [(ngModel)]="user.adresse" name="adresse" placeholder="123 Rue de la Logistique" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Ville</label>
                    <div class="input-wrapper">
                        <i class="fas fa-city"></i>
                        <input type="text" [(ngModel)]="user.ville" name="ville" placeholder="Paris" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Code Postal</label>
                    <div class="input-wrapper">
                        <i class="fas fa-mail-bulk"></i>
                        <input type="number" [(ngModel)]="user.codepostal" name="codepostal" placeholder="75000" required>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Pays</label>
                    <div class="input-wrapper">
                        <i class="fas fa-globe"></i>
                        <input type="text" [(ngModel)]="user.pays" name="pays" placeholder="France" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Type d'activité</label>
                    <div class="input-wrapper">
                        <i class="fas fa-tags"></i>
                        <select [(ngModel)]="user.type" name="type" required>
                            <option value="Standard">Standard</option>
                            <option value="Premium">Premium</option>
                            <option value="Partenaire">Partenaire</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Email Professionnel</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" [(ngModel)]="user.email" name="email" placeholder="votre@email.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" [(ngModel)]="user.password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <div *ngIf="error" class="auth-error">
                <i class="fas fa-exclamation-circle"></i> {{error}}
            </div>

            <button type="submit" class="auth-btn">
                <i class="fas fa-user-plus"></i>
                <span>S'inscrire Maintenant</span>
            </button>

            <div class="auth-footer">
                <span>Vous avez déjà un compte ?</span>
                <a routerLink="/login">Se connecter</a>
            </div>
        </form>
    </div>
</div>
