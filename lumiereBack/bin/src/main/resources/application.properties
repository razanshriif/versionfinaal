spring.application.name=lumiere


### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/dataDivers?allowPublicKeyRetrieval=true&autoReconnect=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

### JPA / HIBERNATE ###
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

### DATA SEED (runs data.sql on every start — INSERT IGNORE keeps it safe) ###
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


server.address=0.0.0.0
server.port=8090


spring.main.allow-bean-definition-overriding=true

spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

server.error.whitelabel.enabled=true
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=tnlumiere@gmail.com
